[build]
  base = "apps/web"
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "11"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# index.html must never be cached so browsers always fetch the latest
# asset filenames (which are content-hashed by Vite).
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Vite hashed assets can be cached forever — their filenames change on every build.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
