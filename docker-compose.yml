version: "3.9"

services:
  bastion:
    build: .
    ports:
      - "3000:3000"
    environment:
      - HELIUS_API_KEY=${HELIUS_API_KEY:?HELIUS_API_KEY is required}
      - BASTION_ON_CHAIN=${BASTION_ON_CHAIN:-}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - BASTION_KEYPAIR_PATH=${BASTION_KEYPAIR_PATH:-}
    volumes:
      - bastion_audit_logs:/data/bastion/audit_logs
      - ./programs/bastion-audit/bastion-audit-keypair.json:/data/bastion/keys/bastion-audit-keypair.json:ro
    restart: unless-stopped

volumes:
  bastion_audit_logs:
