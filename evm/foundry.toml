[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@solady/=lib/solady/src/",
]
solc = "0.8.28"
optimizer = true
optimizer_runs = 2000
evm_version = "cancun"
via_ir = true
gas_reports = ["*"]

[profile.ci]
verbosity = 3
ffi = true

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "short"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "preserve"

[rpc_endpoints]
base = "${BASE_RPC_URL}"
polygon = "${POLYGON_RPC_URL}"
ethereum = "${ETH_RPC_URL}"
celo = "${CELO_RPC_URL}"
celo_testnet = "${CELO_TESTNET_RPC_URL}"
celo_sepolia = "${CELO_SEPOLIA_RPC_URL}"
